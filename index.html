<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ITS U-15G 体力測定レポート</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --its-navy: #001529;
            --its-pink: #ff007f;
        }

        body { 
            margin: 0; padding: 0; background-color: #555; 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
        }

        /* A4サイズを厳格に管理 */
        .a4-page {
            width: 210mm;
            height: 296mm; /* 297mmより1mm短く設定 */
            margin: 10mm auto;
            background: white;
            padding: 10mm 15mm; /* 余白を少し削る */
            box-sizing: border-box;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* はみ出しをカット */
        }

        .header {
            border-bottom: 2px solid var(--its-navy);
            padding-bottom: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .header-title h1 { color: var(--its-navy); font-size: 22px; margin: 0; letter-spacing: 1px; }
        .header-title .sub-title { color: var(--its-pink); font-weight: bold; font-size: 11px; }

        /* 選手情報 */
        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 15px; margin-bottom: 15px;
        }

        .info-item label { 
            font-size: 10px; display: block; color: var(--its-navy); font-weight: bold;
            margin-bottom: 3px; border-left: 3px solid var(--its-pink); padding-left: 6px;
        }

        .info-item input { 
            border: 1px solid #ddd; padding: 6px; font-size: 13px; width: 100%; box-sizing: border-box; border-radius: 4px;
        }

        /* メインレイアウト */
        .main-layout { display: flex; flex-direction: column; gap: 10px; }

        .chart-section { display: flex; justify-content: center; height: 340px; } /* グラフを少し小さく */
        .chart-container { width: 340px; height: 340px; }
        #chartImage { display: none; width: 340px; height: 340px; }

        .table-section h3 { font-size: 14px; color: var(--its-navy); border-bottom: 1px solid var(--its-navy); padding-bottom: 3px; margin: 0 0 10px 0; }

        .result-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .result-table th { background-color: var(--its-navy); color: white; padding: 6px; border: 1px solid #fff; }
        .result-table td { padding: 5px; text-align: center; border: 1px solid #eee; }
        .item-label { text-align: left !important; font-weight: bold; background: #fafafa; padding-left: 10px !important; }
        .current-val { font-weight: bold; background-color: #fff0f6; color: var(--its-pink); }
        .result-table input { width: 40px; text-align: center; border: 1px solid #ccc; padding: 1px; }

        /* コメント欄 */
        .comment-section { margin-top: 10px; border: 1.2px solid var(--its-navy); border-radius: 4px; padding: 10px; }
        .comment-section label { font-size: 11px; font-weight: bold; color: var(--its-pink); display: block; margin-bottom: 5px; }
        .comment-box { width: 100%; height: 50px; border: none; resize: none; font-size: 13px; outline: none; }

        /* フッター */
        .footer {
            position: absolute; bottom: 10mm; left: 15mm; right: 15mm;
            border-top: 1px solid #eee; padding-top: 5px; display: flex;
            justify-content: space-between; color: #999; font-size: 9px;
        }

        .no-print-area { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 50px; border: none; color: white; margin-left: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-update { background: var(--its-navy); }
        .btn-print { background: var(--its-pink); }

        .print-only { display: none; }

        @media print {
            @page { size: A4 portrait; margin: 0; }
            body { background: white; }
            .a4-page { margin: 0; box-shadow: none; width: 210mm; height: 297mm; }
            .no-print-area, input, textarea { display: none !important; }
            .print-only { display: block !important; }
            #fitnessChart { display: none !important; }
            #chartImage { display: block !important; margin: 0 auto; }
            .result-table th { background-color: var(--its-navy) !important; -webkit-print-color-adjust: exact; }
            .current-val { background-color: #fff0f6 !important; -webkit-print-color-adjust: exact; }
            .comment-box-print { display: block !important; min-height: 50px; white-space: pre-wrap; font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="a4-page">
    <div class="header">
        <div class="header-title">
            <div class="sub-title">ITS U-15 GIRLS PERFORMANCE REPORT</div>
            <h1>ITS U-15G 体力測定結果</h1>
        </div>
        <div style="font-size: 9px; color: #666;">CONDITIONING SYSTEM v2.1</div>
    </div>

    <div class="info-grid">
        <div class="info-item">
            <label>測定日 DATE</label>
            <input type="date" id="mDate" value="2026-03-19">
            <span id="pDate" class="print-only"></span>
        </div>
        <div class="info-item">
            <label>学年 GRADE</label>
            <input type="text" id="mGrade" placeholder="例：中学2年">
            <span id="pGrade" class="print-only"></span>
        </div>
        <div class="info-item">
            <label>選手名 NAME</label>
            <input type="text" id="mName" placeholder="選手氏名を入力">
            <span id="pName" class="print-only"></span>
        </div>
    </div>

    <div class="main-layout">
        <div class="chart-section">
            <div class="chart-container">
                <canvas id="fitnessChart"></canvas>
                <img id="chartImage">
            </div>
        </div>

        <div class="table-section">
            <h3>■ 測定データ比較</h3>
            <table class="result-table">
                <thead>
                    <tr>
                        <th style="width: 31%;">測定項目</th>
                        <th style="width: 23%;">目標値</th>
                        <th style="width: 23%;">前回</th>
                        <th style="width: 23%;">今回</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="comment-section">
            <label>COACH'S ADVICE</label>
            <textarea class="comment-box" id="mComment" placeholder="指導者からのフィードバックを入力"></textarea>
            <div id="pComment" class="print-only comment-box-print"></div>
        </div>
    </div>

    <div class="footer">
        <div>ITS U-15G / Physical Fitness Analysis</div>
        <div>https://its-u15g.github.io/</div>
    </div>
</div>

<div class="no-print-area">
    <button onclick="updateChart()" class="btn-update">更新</button>
    <button onclick="prepareAndPrint()" class="btn-print">PDF保存 / 印刷</button>
</div>

<script>
const items = [
    { label: '20m走(秒)', isTime: true, t: 3.5, p: 3.8, a: 3.6 },
    { label: 'プロアジ(秒)', isTime: true, t: 5.5, p: 6.0, a: 5.8 },
    { label: '立ち幅跳び(cm)', isTime: false, t: 210, p: 185, a: 195 },
    { label: 'メディシン(m)', isTime: false, t: 8.5, p: 7.0, a: 7.5 },
    { label: 'シャトルラン', isTime: false, t: 80, p: 60, a: 65 },
    { label: '握力平均(kg)', isTime: false, t: 35, p: 27, a: 29 }
];

const tbody = document.getElementById('tableBody');
items.forEach((item, i) => {
    tbody.innerHTML += `
        <tr>
            <td class="item-label">${item.label}</td>
            <td><input type="number" id="t${i}" value="${item.t}" step="0.1"><span id="pt${i}" class="print-only"></span></td>
            <td><input type="number" id="p${i}" value="${item.p}" step="0.1"><span id="pp${i}" class="print-only"></span></td>
            <td class="current-val"><input type="number" id="a${i}" value="${item.a}" step="0.1"><span id="pa${i}" class="print-only"></span></td>
        </tr>
    `;
});

let myChart = null;

function updateChart() {
    const scoresPrev = [];
    const scoresCurr = [];
    items.forEach((item, i) => {
        const t = parseFloat(document.getElementById('t'+i).value) || 0;
        const p = parseFloat(document.getElementById('p'+i).value) || 0;
        const a = parseFloat(document.getElementById('a'+i).value) || 0;
        scoresPrev.push(p === 0 ? 0 : (item.isTime ? (t/p*100).toFixed(1) : (p/t*100).toFixed(1)));
        scoresCurr.push(a === 0 ? 0 : (item.isTime ? (t/a*100).toFixed(1) : (a/t*100).toFixed(1)));
        document.getElementById('pt'+i).innerText = t;
        document.getElementById('pp'+i).innerText = p;
        document.getElementById('pa'+i).innerText = a;
    });

    document.getElementById('pDate').innerText = document.getElementById('mDate').value;
    document.getElementById('pGrade').innerText = document.getElementById('mGrade').value || " ";
    document.getElementById('pName').innerText = document.getElementById('mName').value || " ";
    document.getElementById('pComment').innerText = document.getElementById('mComment').value;

    const ctx = document.getElementById('fitnessChart').getContext('2d');
    if(myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: items.map(item => item.label.split('(')[0]),
            datasets: [
                { label: '目標', data: [100,100,100,100,100,100], borderColor: '#333', borderDash: [2,2], fill: false, pointRadius: 0, borderWidth: 1 },
                { label: '前回', data: scoresPrev, backgroundColor: 'rgba(200, 200, 200, 0.2)', borderColor: '#bbb', borderWidth: 1 },
                { label: '今回', data: scoresCurr, backgroundColor: 'rgba(255, 0, 127, 0.4)', borderColor: '#ff007f', borderWidth: 3, pointBackgroundColor: '#ff007f', pointRadius: 3 }
            ]
        },
        options: {
            animation: false,
            scales: { r: { min: 0, max: 120, ticks: { display: false }, grid: { color: '#eee' }, angleLines: { color: '#eee' }, pointLabels: { font: { size: 10, weight: 'bold' }, color: '#001529' } } },
            plugins: { legend: { position: 'bottom', labels: { font: { size: 12, weight: 'bold' }, padding: 10 } } }
        }
    });
}

function prepareAndPrint() {
    updateChart();
    const canvas = document.getElementById('fitnessChart');
    const img = document.getElementById('chartImage');
    img.src = canvas.toDataURL('image/png');
    setTimeout(() => { window.print(); }, 300);
}
updateChart();
</script>
</body>
</html>
